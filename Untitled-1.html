<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soccer Teams & Schedule</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f2f2f2; margin: 0; padding: 20px; }
    h1, h2 { text-align: center; }
    .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
    .team { margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 8px; }
    .players { margin-top: 10px; padding-left: 20px; }
    .schedule-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    .schedule-table th, .schedule-table td { padding: 10px; border: 1px solid #555; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Soccer Teams & Match Schedule</h1>

    <h2>Match Schedule</h2>
    <table class="schedule-table">
      <tr>
        <th>Match</th>
        <th>Date</th>
        <th>Location</th>
      </tr>
      <tr>
        <td>Team A vs Team B</td>
        <td>March 12, 2025</td>
        <td>Stadium One</td>
      </tr>
      <tr>
        <td>Team C vs Team A</td>
        <td>March 20, 2025</td>
        <td>National Arena</td>
      </tr>
      <tr>
        <td>Team B vs Team C</td>
        <td>April 5, 2025</td>
        <td>City Field</td>
      </tr>
    </table>

    <h2>Teams & Players</h2>

    <div id="teams"></div>
  </div>

  <script>
    const teams = [
      {
        name: "Team A",
        players: ["Player A1", "Player A2", "Player A3", "Player A4", "Player A5"]
      },
      {
        name: "Team B",
        players: ["Player B1", "Player B2", "Player B3", "Player B4", "Player B5"]
      },
      {
        name: "Team C",
        players: ["Player C1", "Player C2", "Player C3", "Player C4", "Player C5"]
      }
    ];

    const teamContainer = document.getElementById("teams");

    teams.forEach(team => {
      const div = document.createElement("div");
      div.className = "team";

      const title = document.createElement("h3");
      title.textContent = team.name;
      div.appendChild(title);

      const playerList = document.createElement("ul");
      playerList.className = "players";

      team.players.forEach(p => {
        const li = document.createElement("li");
        li.textContent = p;
        playerList.appendChild(li);
      });

      div.appendChild(playerList);
      teamContainer.appendChild(div);
    });
  </script>
</body>
</html>
